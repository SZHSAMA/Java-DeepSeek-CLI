<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZH AI Assistant</title>
    <style>
        /* 苹果系统风格 CSS 保持不变 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f7; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #1d1d1f; }
        .chat-container { width: 100%; max-width: 420px; height: 85vh; max-height: 800px; background: #ffffff; border-radius: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08); display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px; text-align: center; font-weight: 600; font-size: 1.1rem; border-bottom: 1px solid rgba(0, 0, 0, 0.04); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); z-index: 10; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: #fafafa; }
        .message { max-width: 75%; padding: 12px 16px; font-size: 0.95rem; line-height: 1.5; animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; opacity: 0; transform: translateY(10px); word-wrap: break-word; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: #0071e3; color: white; border-radius: 20px 20px 4px 20px; }
        .ai { align-self: flex-start; background: #e9e9eb; color: #1d1d1f; border-radius: 20px 20px 20px 4px; }
        .input-area { padding: 16px 20px; background: #ffffff; display: flex; gap: 12px; align-items: center; border-top: 1px solid rgba(0, 0, 0, 0.04); }
        input { flex: 1; padding: 14px 20px; border: 1px solid #d2d2d7; border-radius: 24px; font-size: 0.95rem; outline: none; background: #f5f5f7; transition: all 0.2s; }
        input:focus { background: #ffffff; border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1); }
        button { background: #0071e3; color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.2s, background 0.2s; }
        button:hover { background: #005cbf; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 15px 20px; height: 20px; }
        .dot { width: 6px; height: 6px; background: #8e8e93; border-radius: 50%; animation: pulse 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); opacity: 0.4;} 40% { transform: scale(1); opacity: 1;} }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">DeepSeek AI 导师</div>
    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你想问的问题..." onkeydown="if(event.keyCode==13) sendMsg()">
        <button onclick="sendMsg()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'szh_chat_history';

    // 1. 页面加载时执行
    window.onload = () => {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const chatBox = document.getElementById('chat-box');

        // 如果是第一次打开（没有历史记录），塞入第一句问候语
        if (history.length === 0) {
            const initMsg = "你好，我是你的 AI 导师。今天想探讨点什么技术？";
            history.push({ role: 'ai', content: initMsg });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        // 渲染所有历史记录
        history.forEach(item => {
            chatBox.innerHTML += `<div class="message ${item.role}">${item.content}</div>`;
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    // 2. 保存单条消息到本地
    function saveMessage(role, content) {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        history.push({ role, content });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    // 3. 发送消息核心逻辑
    async function sendMsg() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const userMsg = input.value.trim();
        if (!userMsg) return;

        // 渲染并保存用户消息
        chatBox.innerHTML += `<div class="message user">${userMsg}</div>`;
        saveMessage('user', userMsg);
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // 渲染加载动画
        const loadingId = 'loading-' + Date.now();
        chatBox.innerHTML += `
            <div class="message ai typing-indicator" id="${loadingId}">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 呼叫后端
            const response = await fetch('/chat?msg=' + encodeURIComponent(userMsg));
            const result = await response.json();

            // 移除动画，渲染并保存 AI 回复
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="message ai">${result.data}</div>`;
            saveMessage('ai', result.data);

        } catch (e) {
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="message ai" style="color: red;">[系统通信故障，请检查后端运行状态]</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
